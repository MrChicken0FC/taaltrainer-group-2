<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Taal Leer Website met API</title>
</head>
<body>

<h2>Taal Leer Website (API)</h2>

<label>Van:</label>
<select id="sourceLang">
    <option value="nl">Nederlands</option>
    <option value="en">Engels</option>
    <option value="fr">Frans</option>
    <option value="es">Spaans</option>
</select>

<label>Naar:</label>
<select id="targetLang">
    <option value="en">Engels</option>
    <option value="fr">Frans</option>
    <option value="es">Spaans</option>
</select>

<br><br>

<input type="text" id="inputText" placeholder="Typ een woord">
<button onclick="vertaal()">Vertaal</button>

<p><strong>Vertaling:</strong></p>
<p id="output"></p>

<hr>

<h3>🎮 Oefenmodus</h3>
<button onclick="startOefening()">Start Oefening</button>

<p id="vraag"></p>
<input type="text" id="antwoord" placeholder="Typ je antwoord">
<button onclick="controleer()">Controleer</button>

<p id="feedback"></p>
<p>Score: <span id="score">0</span></p>

<script src="script.js"></script>

</body>
</html>
